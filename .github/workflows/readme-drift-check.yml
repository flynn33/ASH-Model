name: README Drift Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-readme-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required README references
        run: |
          set -e
          for entry in src/ash_model tests config proofs data figures docs latex tools LICENSE CITATION.cff; do
            test -e "$entry"
            grep -q "$entry" README.md
          done
          grep -q 'not self-dual' README.md
          grep -q 'Binomial(9,1/2)' README.md
