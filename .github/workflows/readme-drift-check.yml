name: README Drift Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-readme-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          AUTH_HEADER="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=$AUTH_HEADER" fetch --no-tags --prune --depth=2 origin "$GITHUB_REF"
          git checkout --force FETCH_HEAD

      - name: Verify required README references
        run: |
          set -e
          for entry in src/ash_model tests config proofs data figures docs latex tools LICENSE CITATION.cff; do
            test -e "$entry"
            grep -q "$entry" README.md
          done
          grep -q 'Nine-dimensional self-duality | false' README.md
          grep -q 'Binomial(9,1/2)' README.md
