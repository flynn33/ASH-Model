name: Discussion Moderation Agent

on:
  discussion:
    types: [created, edited]
  discussion_comment:
    types: [created, edited]
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  discussions: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  moderate:
    name: Moderate Discussions Against Repo Standards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          AUTH_HEADER="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=$AUTH_HEADER" fetch --no-tags --prune --depth=1 origin "$GITHUB_REF"
          git checkout --force FETCH_HEAD

      - name: Moderate discussion content
        env:
          DISCUSSION_MODERATION_ADMIN_TOKEN: ${{ secrets.DISCUSSION_MODERATION_ADMIN_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/github/discussion_moderation_agent.py --root .
