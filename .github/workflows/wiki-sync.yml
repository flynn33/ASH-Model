name: Wiki Source Check

on:
  push:
    branches: [main]
    paths:
      - '.github/wiki-sync.json'
      - 'wiki/**'
      - 'docs/wiki-publication.md'
  pull_request:
    paths:
      - '.github/wiki-sync.json'
      - 'wiki/**'
      - 'docs/wiki-publication.md'

permissions:
  contents: read

jobs:
  check-wiki-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          AUTH_HEADER="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=$AUTH_HEADER" fetch --no-tags --prune --depth=2 origin "$GITHUB_REF"
          git checkout --force FETCH_HEAD

      - name: Validate wiki page mapping
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          root = Path(".")
          payload = json.loads((root / ".github/wiki-sync.json").read_text(encoding="utf-8"))
          pages = payload.get("pages")
          if not isinstance(pages, list) or not pages:
              raise SystemExit(".github/wiki-sync.json must contain a non-empty pages list")

          destinations = set()
          for index, page in enumerate(pages, start=1):
              source = page.get("source")
              destination = page.get("destination")
              if not isinstance(source, str) or not source.startswith("wiki/") or not source.endswith(".md"):
                  raise SystemExit(f"pages[{index}].source must be a wiki/*.md path")
              if not isinstance(destination, str) or "/" in destination or not destination.endswith(".md"):
                  raise SystemExit(f"pages[{index}].destination must be a root wiki Markdown filename")
              if destination in destinations:
                  raise SystemExit(f"duplicate wiki destination: {destination}")
              destinations.add(destination)
              if not (root / source).is_file():
                  raise SystemExit(f"missing mapped wiki source: {source}")
              text = (root / source).read_text(encoding="utf-8")
              if not destination.startswith("_") and not re.search(r"^# .+", text, re.MULTILINE):
                  raise SystemExit(f"mapped wiki source has no H1 heading: {source}")

          print(f"validated {len(pages)} mapped wiki pages")
          PY
