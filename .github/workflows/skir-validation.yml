name: Skir validation

on:
  pull_request:
  push:
    branches:
      - Skir

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy matplotlib sympy pytest
      - name: Compile Python
        run: python -m compileall .
      - name: Run tests
        run: python -m pytest -q
      - name: Audit claims
        run: python tools/audit_claims.py
      - name: Run quick simulation controls
        run: python tools/run_simulation_controls.py --quick
