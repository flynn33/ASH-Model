name: Version Metadata Consistency

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate-version-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate synchronized version declarations
        run: |
          python - <<'PY'
          import json
          import re
          import tomllib
          from pathlib import Path

          root = Path('.')
          version = (root / 'VERSION').read_text(encoding='utf-8').strip()
          pyproject = tomllib.loads((root / 'pyproject.toml').read_text(encoding='utf-8'))['project']['version']
          package_text = (root / 'src/ash_model/__init__.py').read_text(encoding='utf-8')
          package = re.search(r'__version__\s*=\s*["\']([^"\']+)', package_text).group(1)
          config = json.loads((root / 'config/ash_mapping_v1.json').read_text(encoding='utf-8'))['project_version']
          citation_text = (root / 'CITATION.cff').read_text(encoding='utf-8')
          citation = re.search(r'^version:\s*["\']?([^"\'\s]+)', citation_text, re.MULTILINE).group(1)

          versions = {
              'VERSION': version,
              'pyproject.toml': pyproject,
              'src/ash_model/__init__.py': package,
              'config/ash_mapping_v1.json': config,
              'CITATION.cff': citation,
          }
          print(versions)
          if len(set(versions.values())) != 1:
              raise SystemExit('Version declarations are inconsistent')
          PY

      - name: Validate PR classification
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          python - <<'PY'
          import os
          import re

          body = os.environ.get('PR_BODY', '')
          fields = {
              'Change Class': r'\*\*Change Class:\*\*\s*([a-z-]+)',
              'Release Impact': r'\*\*Release Impact:\*\*\s*([a-z]+)',
              'Breaking Change': r'\*\*Breaking Change:\*\*\s*([a-z]+)',
          }
          values = {}
          for name, pattern in fields.items():
              match = re.search(pattern, body, re.IGNORECASE)
              if not match:
                  raise SystemExit(f'Missing PR classification field: {name}')
              values[name] = match.group(1).lower()

          if values['Breaking Change'] == 'yes' and values['Release Impact'] != 'major':
              raise SystemExit('Breaking changes require major release impact')
          if values['Change Class'] == 'breaking-change' and values['Release Impact'] != 'major':
              raise SystemExit('breaking-change classification requires major release impact')
          print(values)
          PY
